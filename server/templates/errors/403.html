{% extends "base.html" %}
{% block title %}403 Forbidden | FreeViewer{% endblock %}
{% block content %}
<div style="text-align:center;padding:4rem 1rem;">
    <div style="font-size:4rem;font-weight:800;color:#e2e8f0;">403</div>
    <div style="font-size:1.25rem;font-weight:600;color:#0f172a;margin:.5rem 0;">Access denied</div>
    <p style="color:#64748b;margin-bottom:2rem;">You don't have permission to access this page.</p>
    <a href="{{ url_for('dashboard.dashboard') if g.user else url_for('auth.login') }}" class="btn-primary-fv">
        Go home
    </a>
</div>
{% endblock %}
