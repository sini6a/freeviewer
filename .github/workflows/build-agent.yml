name: Build Windows Agent

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'agent/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          $version = (Get-Content agent/version.txt -Raw).Trim()
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          cd agent
          pyinstaller --onedir --windowed --name FreeViewer agent_gui.py

      - name: Zip output
        run: |
          Compress-Archive -Path agent/dist/FreeViewer/* -DestinationPath agent/dist/FreeViewer.zip

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" agent/dist/FreeViewer.zip `
            --title "v${{ steps.ver.outputs.version }}" `
            --notes "Built from commit ${{ github.sha }}"
