<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeViewer Agent — Download</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 32px rgba(0,0,0,.08);
            padding: 2.5rem 3rem;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        .icon {
            width: 64px; height: 64px;
            background: #eff6ff;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: #3b82f6;
        }
        h1 { font-size: 1.4rem; font-weight: 700; color: #0f172a; margin-bottom: .5rem; }
        p  { font-size: .9rem; color: #64748b; margin-bottom: 2rem; line-height: 1.6; }
        .btn {
            display: inline-flex; align-items: center; gap: .5rem;
            background: #3b82f6;
            color: #fff;
            padding: .75rem 1.75rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: .95rem;
            transition: background .15s;
        }
        .btn:hover { background: #2563eb; }
        .note {
            margin-top: 1.5rem;
            font-size: .78rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="bi bi-display"></i></div>
        <h1>FreeViewer Agent</h1>
        <p>Run this on the Windows PC you want to control remotely.<br>
           After launching, enter your pairing code from the dashboard.</p>
        <a href="{{ download_url }}" class="btn">
            <i class="bi bi-download"></i> Download for Windows
        </a>
        <div class="note">Windows 10 / 11 &nbsp;·&nbsp; 64-bit</div>
    </div>
</body>
</html>
